<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Retail Robot · Product Recommendation Demo</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b26; --panel-2:#1d2430; --line:#2a3342;
    --ink:#e8edf5; --ink-2:#a7b2c4; --muted:#6f7d92;
    --brand:#4f8cff; --brand-ink:#bcd4ff; --accent:#ff8a4c;
    --good:#33c07f; --warn:#f0b04a; --bad:#ff6b6b;
    --user:#274168; --bot:#1e2734;
    --radius:14px; --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--sans); color:var(--ink); background:
      radial-gradient(1200px 600px at 20% -10%, #1a2540 0%, transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, #241a33 0%, transparent 55%), var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  header.top{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(22,27,38,.9),rgba(22,27,38,.6));backdrop-filter:blur(6px);position:sticky;top:0;z-index:5;}
  .logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--brand),#7a5cff);font-size:20px;box-shadow:0 6px 18px -8px var(--brand);}
  .top h1{font-size:1.02rem;margin:0;font-weight:700;letter-spacing:.2px;}
  .top .sub{font-size:.76rem;color:var(--ink-2);margin-top:1px;}
  .top .spacer{flex:1;}
  .knobs{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:.74rem;color:var(--ink-2);}
  .knob{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);padding:5px 9px;border-radius:999px;}
  .knob select{background:transparent;color:var(--ink);border:none;font:inherit;outline:none;cursor:pointer;}
  .badge{font-size:.74rem;color:var(--good);background:rgba(51,192,127,.1);border:1px solid rgba(51,192,127,.35);padding:5px 11px;border-radius:999px;}
  .settings{max-width:1240px;margin:0 auto;padding:14px 18px;display:flex;flex-direction:column;gap:9px;
    border-bottom:1px solid var(--line);background:rgba(29,36,48,.5);}
  .settings .srow{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--ink-2);}
  .settings .srow label{width:150px;flex:none;}
  .settings .srow .opt{color:var(--muted);}
  .settings input,.settings select{flex:1;max-width:520px;background:var(--bg);border:1px solid var(--line);border-radius:8px;
    padding:8px 11px;color:var(--ink);font:inherit;outline:none;}
  .settings input:focus{border-color:var(--brand);}
  .snote{font-size:.74rem;color:var(--muted);line-height:1.5;}
  .snote code{background:var(--panel-2);padding:1px 5px;border-radius:5px;color:var(--brand-ink);font-size:.72rem;}
  .snote button{margin-left:6px;background:none;border:1px solid var(--line);color:var(--ink-2);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:.72rem;}
  .snote button:hover{color:var(--bad);border-color:var(--bad);}
  .bub .err{color:var(--bad);font-size:.86rem;}

  .wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:16px;max-width:1240px;margin:0 auto;padding:18px 18px 28px;}
  @media(max-width:920px){ .wrap{grid-template-columns:1fr;} }
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .card > .hd{padding:11px 15px;border-bottom:1px solid var(--line);font-size:.74rem;letter-spacing:.09em;
    text-transform:uppercase;color:var(--ink-2);display:flex;align-items:center;gap:8px;background:var(--panel-2);}
  .hd .dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px rgba(51,192,127,.15);}
  .langsw{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .langsw button{background:transparent;border:none;color:var(--ink-2);font:inherit;font-size:.72rem;padding:3px 10px;cursor:pointer;letter-spacing:0;}
  .langsw button.on{background:var(--brand);color:#fff;}

  .chat{display:flex;flex-direction:column;height:min(74vh,700px);}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px;}
  .row{display:flex;gap:9px;max-width:88%;}
  .row.user{align-self:flex-end;flex-direction:row-reverse;}
  .av{width:28px;height:28px;border-radius:8px;flex:none;display:grid;place-items:center;font-size:15px;}
  .av.bot{background:linear-gradient(135deg,var(--brand),#7a5cff);}
  .av.user{background:var(--user);}
  .bub{padding:10px 13px;border-radius:13px;font-size:.92rem;line-height:1.5;border:1px solid var(--line);}
  .row.bot .bub{background:var(--bot);border-top-left-radius:4px;}
  .row.user .bub{background:var(--user);border-top-right-radius:4px;}
  .bub .rec{margin-top:9px;padding:11px;border-radius:12px;background:rgba(79,140,255,.09);border:1px solid rgba(79,140,255,.3);display:flex;gap:11px;align-items:flex-start;}
  .bub .rec .thumb{width:46px;height:46px;flex:none;border-radius:12px;display:grid;place-items:center;font-size:25px;
    background:var(--panel-2);background:color-mix(in srgb,var(--cc) 20%,var(--panel-2));
    border:1px solid var(--line);border-color:color-mix(in srgb,var(--cc) 55%,transparent);
    box-shadow:0 5px 16px -7px var(--cc);}
  .bub .rec .recbody{flex:1;min-width:0;}
  .bub .rec .nm{font-weight:700;color:var(--ink);font-size:.95rem;line-height:1.25;}
  .bub .rec .px{font-size:.75rem;color:var(--ink-2);margin-top:1px;}
  .bub .rec .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
  .rb{font-size:.65rem;padding:2px 7px;border-radius:6px;border:1px solid var(--line);color:var(--ink-2);background:var(--panel);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
  .rb.g{color:var(--good);border-color:rgba(51,192,127,.4);background:rgba(51,192,127,.08);}
  .rb.w{color:var(--warn);border-color:rgba(240,176,74,.4);background:rgba(240,176,74,.08);}
  .rb.b{color:var(--bad);border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08);}
  .rb.novel{color:var(--brand-ink);border-color:rgba(79,140,255,.4);background:rgba(79,140,255,.1);}
  .rb.sweetb{padding:3px 7px;} .rb .sweet i{width:6px;height:6px;}
  .bub ol{margin:8px 0 4px;padding-left:20px;} .bub ol li{margin:3px 0;}
  .bub .plan{margin-top:8px;font-size:.82rem;color:var(--ink-2);border-left:2px solid var(--good);padding-left:10px;}
  .bub .plan b{color:var(--good);}
  .bub .typing span{display:inline-block;width:6px;height:6px;margin:0 1px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite both;}
  .bub .typing span:nth-child(2){animation-delay:.2s;} .bub .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  .bub .caret{display:inline-block;width:2px;height:1em;margin-left:2px;vertical-align:text-bottom;background:var(--ink-2);animation:blink 1s infinite;}

  .composer{border-top:1px solid var(--line);padding:11px;display:flex;flex-direction:column;gap:9px;background:var(--panel-2);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{font-size:.76rem;color:var(--brand-ink);background:rgba(79,140,255,.1);border:1px solid rgba(79,140,255,.3);padding:5px 10px;border-radius:999px;cursor:pointer;transition:.15s;}
  .chip:hover{background:rgba(79,140,255,.22);}
  .inrow{display:flex;gap:9px;}
  .inrow input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--ink);font:inherit;outline:none;}
  .inrow input:focus{border-color:var(--brand);}
  .inrow button{background:linear-gradient(135deg,var(--brand),#6d7bff);border:none;color:#fff;font-weight:700;padding:0 18px;border-radius:11px;cursor:pointer;font-size:.9rem;}
  .inrow button:active{transform:translateY(1px);}
  .reset{background:none;border:1px solid var(--line);color:var(--ink-2);border-radius:11px;padding:0 13px;cursor:pointer;}

  .right{display:flex;flex-direction:column;gap:16px;}
  .reason{font-family:var(--mono);font-size:.8rem;padding:14px 15px;line-height:1.6;min-height:110px;}
  .statebar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:11px 15px;border-bottom:1px solid var(--line);background:var(--panel-2);}
  .pill{font-family:var(--mono);font-size:.7rem;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--ink-2);}
  .pill.on{background:rgba(79,140,255,.18);border-color:var(--brand);color:var(--brand-ink);}
  .arrow{color:var(--muted);font-size:.7rem;}
  .rk{color:var(--muted);} .rv{color:var(--ink);}
  .tag{color:var(--brand-ink);} .ex{color:var(--bad);} .ok{color:var(--good);} .cand{color:var(--accent);}
  .reason .ln{white-space:pre-wrap;} .placeholder{color:var(--muted);font-style:italic;}

  /* session: memory + cart */
  .session{padding:12px 14px;display:flex;flex-direction:column;gap:11px;}
  .seclabel{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .prefrow{display:flex;gap:6px;flex-wrap:wrap;min-height:22px;}
  .pref{font-size:.72rem;color:var(--accent);background:rgba(255,138,76,.1);border:1px solid rgba(255,138,76,.35);padding:3px 9px;border-radius:999px;}
  .pref.none{color:var(--muted);background:none;border-color:var(--line);}
  .cartlist{display:flex;flex-direction:column;gap:6px;}
  .cartitem{display:flex;align-items:center;gap:8px;font-size:.84rem;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:6px 10px;}
  .cartitem .ci{font-size:15px;flex:none;}
  .cartitem .q{font-weight:800;color:var(--brand-ink);min-width:24px;}
  .cartitem .nm{flex:1;line-height:1.2;}
  .cartitem .rm{cursor:pointer;color:var(--muted);border:none;background:none;font-size:1rem;line-height:1;}
  .cartitem .rm:hover{color:var(--bad);}
  .cartempty{font-size:.8rem;color:var(--muted);font-style:italic;}
  .cartbar{display:flex;align-items:center;gap:10px;margin-top:2px;}
  .cartbar .tot{font-size:.8rem;color:var(--ink-2);flex:1;}
  .checkout{background:linear-gradient(135deg,var(--good),#2aa06a);border:none;color:#04120b;font-weight:800;padding:8px 14px;border-radius:9px;cursor:pointer;font-size:.82rem;}
  .checkout:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.4);}

  .inv{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:320px;overflow-y:auto;}
  @media(max-width:520px){ .inv{grid-template-columns:1fr;} }
  .p{border:1px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--panel-2);transition:.18s;position:relative;}
  .p.dim{opacity:.32;filter:saturate(.5);}
  .p.hit{border-color:var(--brand);box-shadow:0 0 0 2px rgba(79,140,255,.35);background:rgba(79,140,255,.08);}
  .p.rec{border-color:var(--good);box-shadow:0 0 0 2px rgba(51,192,127,.45);}
  .p .nm{font-size:.82rem;font-weight:700;line-height:1.25;}
  .p .cat{font-size:.68rem;color:var(--muted);margin:2px 0 7px;}
  .p .attrs{display:flex;gap:5px;flex-wrap:wrap;}
  .b{font-size:.64rem;padding:2px 6px;border-radius:5px;border:1px solid var(--line);color:var(--ink-2);white-space:nowrap;}
  .b.fn{color:var(--brand-ink);border-color:rgba(79,140,255,.4);background:rgba(79,140,255,.08);}
  .b.sw{color:var(--accent);} .b.st{color:var(--good);}
  .sweet{display:inline-flex;gap:2px;vertical-align:middle;} .sweet i{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.28;} .sweet i.f{opacity:1;}
  .recflag{position:absolute;top:-8px;right:8px;font-size:.6rem;background:var(--good);color:#04120b;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.05em;}
  .qbadge{position:absolute;top:-8px;left:8px;font-size:.6rem;background:var(--brand);color:#fff;font-weight:800;padding:2px 7px;border-radius:999px;}
  .legend{font-size:.68rem;color:var(--muted);padding:0 14px 12px;display:flex;gap:14px;flex-wrap:wrap;}
  .legend b{color:var(--ink-2);font-weight:600;}
  .foot{max-width:1240px;margin:0 auto;padding:2px 20px 30px;color:var(--muted);font-size:.74rem;line-height:1.6;}
  .foot code{background:var(--panel-2);padding:1px 5px;border-radius:5px;color:var(--brand-ink);font-size:.72rem;}
</style>
</head>
<body>
<div class="wrap">
  <section class="card chat">
    <div class="hd"><span class="dot"></span> <span id="t-chat">Chatbot</span>
      <span style="flex:1"></span>
      <span class="langsw"><button id="lang-en" class="on">EN</button><button id="lang-zh">中文</button></span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <div class="chips" id="chips"></div>
      <div class="inrow">
        <input id="in" autocomplete="off" placeholder="Tell the robot what you feel like…">
        <button id="send">Send</button>
        <button class="reset" id="reset" title="Restart conversation">↺</button>
      </div>
    </div>
  </section>

  <div class="right">
    <section class="card">
      <div class="statebar" id="statebar"></div>
      <div class="hd" style="border-top:1px solid var(--line)"><span class="dot" style="background:var(--accent);box-shadow:0 0 0 3px rgba(255,138,76,.15)"></span> <span id="t-reason">Reasoning · scratchpad</span></div>
      <div class="reason" id="reason"><span class="placeholder">The bot's need → function → constraints → candidates reasoning shows here each turn.</span></div>
    </section>

    <section class="card">
      <div class="hd"><span class="dot" style="background:var(--brand);box-shadow:0 0 0 3px rgba(79,140,255,.15)"></span> <span id="t-session">Session memory &amp; cart</span></div>
      <div class="session">
        <div><div class="seclabel" id="t-prefs">Standing preferences (remembered)</div><div class="prefrow" id="prefs"></div></div>
        <div><div class="seclabel" id="t-cartlabel">Cart</div><div class="cartlist" id="cart"></div>
          <div class="cartbar"><span class="tot" id="carttot"></span><button class="checkout" id="checkout">Check out</button></div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><span class="dot"></span> <span id="t-inv">Store inventory</span> <span style="flex:1"></span><span id="invcount" style="color:var(--muted)"></span></div>
      <div class="inv" id="inv"></div>
      <div class="legend" id="legend"></div>
    </section>
  </div>
</div>

  const lead=text.match(/^\s*(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\s+[a-z]/);   // "two waters", "3 juices"
  if(lead){const w=lead[1];return NUMWORDS[w]||parseInt(w)||null;}
  return null;
}
// "make it three", "change to 2", "actually 3", "N instead", 中文 "改成两个" → SET the quantity (not add more). Requires
// an explicit number so "make it cold" / "actually a gift" don't trip it.
function setQtyIntent(text){
  const m=text.match(/\b(?:make it|make that|change (?:it )?to|set (?:it )?to|actually|just|only)\s+(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\b/);
  if(m)return NUMWORDS[m[1]]||parseInt(m[1])||null;
  const inst=text.match(/\b(\d+|one|two|three|four|five|six|seven|eight|nine|ten)\s+instead\b/);
  if(inst)return NUMWORDS[inst[1]]||parseInt(inst[1])||null;
  const zh=text.match(/(?:改成|改为|换成)\s*([0-9一二两三四五六七八九十]+)/);
  if(zh)return ZHNUM[zh[1]]||parseInt(zh[1])||null;
  return null;
}
function parseOrdinal(text){
  for(const k in ORDINALS){if(has(text,k))return ORDINALS[k];}
  const zo={"第一":0,"第二":1,"第三":2,"第四":3,"最后":-1};
  for(const k in zo){if(text.includes(k))return zo[k];}
  return null;
}
// Is `term` negated in `text` ("no electrolytes", "not the mango", "不要芒果")? Used so a reference to a product
// the shopper is EXCLUDING isn't read as a request for it.
function negatedTerm(text,term){
  const t=term.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&');
  if(CJK.test(term))return new RegExp("(不要|不想|不用|别|没有|不喜欢|不加|去掉|不放|除了)"+t).test(text);
  return new RegExp("\\b(no|not|without|dont|hate|avoid|skip|hold|minus|except|but not)\\s+(?:\\w+\\s+){0,2}"+t+"\\w*\\b").test(text);   // \\w* so "no electrolytes" negates the singular "electrolyte"
}
function anyHasUnnegated(text,list){return list.some(p=>has(text,p)&&!negatedTerm(text,p));}
function referencedProduct(text,pool){
  const hits=DISTINCTIVE.filter(d=>text.includes(d)&&!negatedTerm(text,d));   // "not the mango" must not resolve to mango
  if(!hits.length)return null;
  let best=null,bestN=0;
  for(const p of pool){const hay=(p.name+" "+p.flavor+" "+p.keywords.join(" ")+" "+(ZH_NAME[p.id]||"")).toLowerCase();
    const n=hits.filter(h=>hay.includes(h)).length;if(n>bestN){bestN=n;best=p;}}
  return bestN>0?best:null;
}
// "one more" / "two more" / "another one" → quantity to re-add (POST_ADD); null if not a re-add
function readdQty(text){
  const m=text.match(/\b(\d+|one|two|three|four|five|couple)\s+more\b/);
  if(m){const w=m[1];return NUMWORDS[w]||parseInt(w)||1;}
  if(anyHas(text,READD))return parseQty(text)||1;
  return null;
}
// which product attribute a question is about (or null) — used to answer product questions precisely
function questionTopic(text){
  if(/\b(sugar|sweet|sweetness)\b/.test(text)||/甜|糖/.test(text))return "sweet";
  if(/\b(cold|chilled|chill|warm|frozen|temperature|hot|room temp)\b/.test(text)||/冰|凉|冷|常温|温度|热/.test(text))return "temp";
  if(/\b(caffeine|caffeinated|coffee|decaf)\b/.test(text)||/咖啡因|咖啡/.test(text))return "caffeine";
  if(/\b(calorie|calories|kcal|healthy|fattening|diet)\b/.test(text)||/热量|卡路里|多少卡|健康/.test(text))return "calories";
  if(/(what.?s in|whats in|made of|made from|ingredient|contain|flavou?r|taste)/.test(text)||/成分|什么味|口味|味道|含什么|里面/.test(text))return "ingredients";
  if(/(how many|in stock|stock|available|quantity|left)/.test(text)||/库存|还有多少|有几|多少个|剩/.test(text))return "stock";
  return null;
}
// Pull the (possibly incomplete) "message" string out of a streaming JSON action, for live display as it types.
// Returns the unescaped text so far, or null if the "message" field hasn't started streaming yet.
function partialMessage(s){
  const m=s.match(/"message"\s*:\s*"/);
  if(!m)return null;
  let out="";
  for(let i=m.index+m[0].length;i<s.length;i++){
    const c=s[i];
    if(c==="\\"){
      const n=s[i+1];
      if(n===undefined)break;
      if(n==="u"){                                   // \uXXXX → real char (so escaped Chinese never shows as "u4f60")
        const hex=s.slice(i+2,i+6);
        if(hex.length<4||/[^0-9a-fA-F]/.test(hex))break;   // incomplete escape → wait for more tokens
        out+=String.fromCharCode(parseInt(hex,16));i+=5;
      }else{out+=n==="n"?"\n":n==="t"?"\t":n==="r"?"\r":n==="b"?"\b":n==="f"?"\f":n;i++;}   // \" \\ \/ etc → the char itself
    }
    else if(c==='"')break;   // closing quote → message complete
    else out+=c;
  }
  return out;
}
// is this utterance a question about the current pick (so we answer instead of re-ranking)?
function isProductQuestion(raw,text){
  if(/[?？]/.test(raw))return true;
  if(/^(is|are|isnt|does|do|doesnt|can|could|has|have|how|what|which|why|where|whats|hows)\b/.test(text))return true;
  if(/\b(how much|how many|tell me about|what about)\b/.test(text))return true;
  if(/吗|多少|有没有|是不是|几个|什么味|口味/.test(raw))return true;
  return false;
}

/* ===================== CONVERSATION STATE MACHINE ===================== */
let C;
function newConvo(){return {state:"GREETING",profile:blankConstraints(),cart:[],history:[],lastRec:null,lastOptions:[],need:null,lastReason:null,queue:[]};}
function memoryOn(){const e=document.getElementById("knob-memory");return !e||e.value==="on";}
function clarifyBudget(){const e=document.getElementById("knob-clarify");return e&&e.value==="0.7"?3:2;}
function newNeed(){return {rawUtterance:"",scores:{},functions:[],constraints:memoryOn()?cloneC(C.profile):blankConstraints(),candidates:[],scored:[],currentRec:null,offeredSkus:[],clarifyCount:0,pendingQty:null};}
function persistPrefs(text){
  if(!memoryOn())return;const c=C.profile;
  if(anyHas(text,NOT_SWEET)){c.notSweet=true;c.wantSweet=false;c.max_sweetness=2;c.prefer_sugar=["none","low"];}
  else if(anyHas(text,YES_SWEET)){c.wantSweet=true;c.notSweet=false;c.max_sweetness=null;c.prefer_sugar=[];}
  if(anyHas(text,NO_CAF))c.caffeine=false;
  // Remember a flavour love only when it's framed as a preference ("I love mango"), not a one-off order ("a mango juice").
  if(anyHas(text,LIKE_CUES)){for(const [w,canon] of FLAVOR_WORDS){if(has(text,w)&&!negatedTerm(text,w)){c.likeFlavor=canon;break;}}}
}
function cartAdd(p,q){
  const ex=C.cart.find(i=>i.id===p.id);
  if(ex)ex.qty=Math.min(p.qty,ex.qty+q);else C.cart.push({id:p.id,name:p.name,qty:q,location:p.location,ett:p.execution_task_type||null});
}
function cartRemove(id){C.cart=C.cart.filter(i=>i.id!==id);}

function infer(){
  const need=C.need;
  need.scores=scoreFunctions(need.rawUtterance);
  need.functions=inferredFrom(need.scores);
  // "I want a drink": prefer a beverage. Drop WEAK non-beverage false-positives — the "give" in "give me a
  // drink" (gift) or the "cold" in "a cold drink" (dessert) — while still honouring a strong, explicit treat/gift
  // signal (e.g. "a drink and a blind box"). If nothing's left, default to plain water so it's never a mystery box.
  if(anyHas(need.rawUtterance,GENERIC_DRINK)){
    const BEVERAGE=["hydration","rehydration_electrolytes","fruit_refreshment"];
    need.functions=need.functions.filter(f=>BEVERAGE.includes(f)||need.scores[f]>=THRESHOLD);
    if(need.functions.length===0)need.functions=["hydration"];
  }
  // Health / diet lean with no specific flavour → recommend the plain, zero-sugar water honestly.
  if(need.functions.length===0&&anyHas(need.rawUtterance,HEALTH_LEAN)){
    need.functions=["hydration"];need.constraints.notSweet=true;need.constraints.max_sweetness=2;need.constraints.prefer_sugar=["none","low"];
  }
  // A bare product/brand/flavour name with no function words ("evian", "农夫山泉", "the mango one") → adopt that
  // item's own tags so doRank recommends it directly instead of asking a needless clarifying question.
  let named=null;
  if(need.functions.length===0){named=referencedProduct(need.rawUtterance,CATALOG);if(named)need.functions=[...named.function_tags];}
  // "not sweet" + only a WEAK dessert signal (usually the ambiguous word "cold") is really a cold NON-sweet drink,
  // not sweet ice cream — steer to water rather than letting the relax loop bust the explicit no-sugar request.
  if(anyHas(need.rawUtterance,NOT_SWEET)&&need.functions.length>0&&need.functions.every(f=>f==="treat_dessert")&&(need.scores.treat_dessert||0)<THRESHOLD){
    need.functions=["hydration"];
  }
  extractInto(need.constraints,need.rawUtterance);
  persistPrefs(need.rawUtterance);
  const fns=need.functions;
  const reason={need:need.rawUtterance,scores:need.scores,fns:[...fns],constraints:{...need.constraints},candidates:[],exclusions:[],decision:"",inv:""};
  if(fns.length===0&&need.clarifyCount<clarifyBudget()){reason.decision="ask_clarifying (need unclear)";C.lastReason=reason;C.state="CLARIFY";return {kind:"say",text:L().qIdentify};}
  // When the shopper named a specific item, skip the pair / sweetness questions — doRank will surface that exact item.
  const pair=named?null:ambiguousPair(fns,need.scores);
  if(pair&&need.clarifyCount<clarifyBudget()){reason.decision="ask_clarifying ("+pair.join(" vs ")+")";C.lastReason=reason;C.state="CLARIFY";return {kind:"say",text:L().pair(pair)};}
  if(!named&&needsSweetnessQ(need)&&need.clarifyCount<clarifyBudget()){reason.decision="ask_clarifying (sweetness unknown)";C.lastReason=reason;C.state="CLARIFY";return {kind:"say",text:L().qSweet};}
  return doRank(reason);
}
function doRank(reason){
  const need=C.need;rank(need);
  const allFn=CATALOG.filter(p=>p.function_tags.some(t=>need.functions.includes(t)));
  reason.candidates=need.candidates.slice(0,4).map(p=>`${p.name} · sw${p.sweetness} · ${p.sugar_level} · ${p.served} · qty${p.qty}`);
  reason.exclusions=allFn.filter(p=>!need.candidates.includes(p)).slice(0,4).map(p=>{
    let why=need.offeredSkus.includes(p.id)?"already declined"
      :(need.constraints.max_sweetness!=null&&p.sweetness>need.constraints.max_sweetness)?`sweetness ${p.sweetness} > ceiling ${need.constraints.max_sweetness}`
      :(need.constraints.served_in.length&&!need.constraints.served_in.includes(p.served))?`served ${p.served} ≠ wanted`:"not in top set";
    return `${p.name} — ${why}`;});
  if(need.candidates.length===0){
    const c=need.constraints;
    const retry=d=>{reason.decision="no match → "+d;C.lastReason=reason;return doRank({need:need.rawUtterance,scores:need.scores,fns:[...need.functions],constraints:{...c},candidates:[],exclusions:[],decision:"",inv:""});};
    // relax ONE constraint at a time, softest first, until something fits or nothing is left — each branch makes
    // progress (empties served_in / clears caffeine / +1 sweetness up to 5), so this always terminates.
    if(c.served_in.length){c.served_in=[];return retry("relax temperature");}
    if(c.caffeine!=null){c.caffeine=null;return retry("relax caffeine");}
    // "a juice without sugar": nothing in the wanted category is low-sugar. Respect an explicitly-stated no-sugar
    // request (this message, not just a standing preference) by broadening to plain water (zero sugar) rather than
    // busting the constraint into a sugary juice — but never when they explicitly named a sweet item ("ice cream").
    if(c.notSweet&&anyHas(need.rawUtterance,NOT_SWEET)&&!need.functions.includes("treat_dessert")&&!need.functions.includes("hydration")){need.functions.push("hydration");return retry("no low-sugar option → add water");}
    if(c.max_sweetness!=null&&c.max_sweetness<5){c.max_sweetness++;return retry("relax sweetness +1");}
    reason.decision="no_match";C.lastReason=reason;C.state="ELICIT_NEED";
    return {kind:"say",text:L().noMatch};
  }
  // If the shopper named a specific flavour/product (e.g. "mango", "芒果汁", "石榴电解质水"), honour it exactly.
  // Otherwise pick among the items TIED at the top score — pick() is random in the app (a fresh face each visit,
  // so "a gift" / "surprise me" don't always return the identical item) and deterministic-first under test.
  // Chinese flavour words don't overlap the English keywords the scorer uses, so the named path is what makes
  // "要芒果汁" resolve to mango instead of orange.
  const named=referencedProduct(need.rawUtterance,need.candidates);
  let rec;
  if(named){rec=named;reason.decision="named→"+named.id+"; ";}
  else{const top=need.scored[0].total;const tied=need.scored.filter(s=>s.total===top).map(s=>s.p);rec=pick(tied);if(tied.length>1)reason.decision="pick 1 of "+tied.length+" tied; ";}
  if(need.candidates[0]!==rec){need.candidates=[rec,...need.candidates.filter(p=>p!==rec)];}
  need.currentRec=rec;C.lastRec=rec;C.lastOptions=need.candidates.slice(0,3);
  reason.inv=`${rec.name} · qty ${rec.qty} — ${rec.qty>=3?"OK":"LOW"}`;reason.decision=(reason.decision||"")+`recommend ${rec.id}`;
  C.lastReason=reason;C.state="RECOMMEND";
  return {kind:"recommend",rec};
}
function offerLine(p){
  return L().offer(p,C.need.functions[0],C.need.constraints.notSweet,C.cart.length>0);
}
function accept(qty){
  const p=C.need.currentRec;const want=qty||C.need.pendingQty||1;const q=Math.min(want,p.qty);
  cartAdd(p,q);C.state="POST_ADD";
  const added={kind:"added",product:p,qty:q,capped:want>p.qty};
  // Compound request ("a water and an ice cream"): after adding one item, advance to the next queued item so the
  // whole basket gets built in one flow instead of dropping everything but the last thing they said.
  if(C.queue&&C.queue.length){const next=C.queue.shift();added.next=startNeed(next);}
  return added;
}
function startNeed(text){C.need=newNeed();C.need.rawUtterance=text;C.need.pendingQty=parseQty(text);return infer();}
// "a water and an ice cream", "两瓶水和一个冰淇淋" → ["a water","an ice cream"]; null if it isn't really two+ distinct
// items. Splits the RAW text (commas survive here — normalize() would strip them) then normalises each piece.
function splitCompound(raw){
  const segs=raw.split(/\s*(?:,|;|、|，|\band\b|\bplus\b|\bthen\b|&|以及|还有|外加|和|跟)\s*/i).map(x=>normalize(x)).filter(Boolean);
  if(segs.length<2)return null;
  const items=segs.filter(hasItemNeed);   // each piece must name an actual item, not just a shared modifier ("cold")
  return items.length>=2?items:null;
}
// Does this fragment name a concrete item to ADD (a function, product, drink or health lean) rather than a bare
// constraint ("cold") or an exclusion ("no juice")? Used so "not sweet and cold" and "no juice, just water" each
// stay ONE need instead of being mis-split into two.
function hasItemNeed(seg){
  if(/\b(no|not|without|dont|hold|skip|hate|avoid)\b/.test(seg)||/不要|不用|不想|别的?|没有|不喜欢/.test(seg))return false;
  return Object.keys(scoreFunctions(seg)).length>0||!!referencedProduct(seg,CATALOG)||anyHas(seg,GENERIC_DRINK)||anyHas(seg,HEALTH_LEAN);
}
// Start a fresh need, honouring a compound "X and Y" by queueing the extra items for auto-advance on each add.
function beginNeed(raw){
  const parts=splitCompound(raw);
  if(parts){C.queue=parts.slice(1);return startNeed(parts[0]);}
  C.queue=[];return startNeed(normalize(raw));
}
function checkout(){
  const items=C.cart.map(i=>({...i}));C.state="ELICIT_NEED";C.cart=[];C.queue=[];
  return {kind:"checkout",items};
}

/* --- small talk & open-ended intents (so it feels conversational) --- */
const GREET=["hi","hello","hey","yo","hiya","howdy","sup","hey there","good morning","good afternoon","good evening","morning","evening","你好","您好","嗨","哈喽","哈啰","早上好","晚上好","在吗"];
const THANKS=["thanks","thank you","thankyou","thx","cheers","ta","appreciate it","much appreciated","谢谢","多谢","感谢","谢啦","辛苦了"];
const HELP=["help","what do you have","what do you sell","whats available","what is available","menu","what can i get","what are my options","whats good","what is good","what should i get","what you got","有什么","有啥","卖什么","菜单","有什么好","都有什么"];
const SURPRISE=["surprise me","you pick","you choose","you decide","whatever","dunno","i dont know","not sure","recommend something","suggest something","recommend me something","what do you recommend","recommend","suggest","pick for me","up to you","anything is fine","anything works","anything you like","anything at all","just anything","something nice","something good","cheer me up","im bored","treat me to something","most popular","whats popular","best seller","bestseller","your favourite","your favorite","idk","随便","随便推荐","你决定","你选","都行","随你","帮我选","推荐一个","看着来","随便来","不知道","不知道要什么","不确定","来点好的","随便来点","最受欢迎","最热门","卖得最好"];   // bare "anything" removed — it mis-fired on "anything with caffeine" etc.
// Logistics questions the machine can't answer with a catalog lookup. Better an honest fixed reply than an
// escalation to a small model that will happily invent a price or a delivery option.
const PRICE=["price","the price","whats the price","how much is it","how much is that","how much are","how much does","how much for","how much would","cost","costs","how expensive","cheapest","the cheapest","多少钱","价格","价钱","什么价","多少钱一","贵吗","贵不贵","便宜","最便宜","哪个便宜"];
const PAY=["pay","payment","apple pay","google pay","credit card","debit card","cash","how do i pay","take card","take cards","付款","怎么付","支付","刷卡","现金","微信支付","支付宝","怎么付款"];
const LOCATION=["where is","which aisle","what aisle","aisle","how do i get to","can you deliver","do you deliver","delivery","在哪","在哪里","怎么走","哪个货架","配送","送货"];
function infoTopic(text){
  if(anyHas(text,PRICE))return "price";
  if(anyHas(text,PAY))return "pay";
  if(anyHas(text,LOCATION))return "location";
  return null;
}
// Contentless one-word openers — a re-prompt is cheaper and friendlier than escalating to the model.
const FILLER=new Set(["yes","yeah","yep","yup","no","nope","nah","maybe","hmm","hm","ok","okay","k","sure","um","uh","huh","eh","meh","嗯","啊","额","呃","哦"]);
function hasNeedSignal(text){
  return Object.keys(scoreFunctions(text)).length>0||anyHas(text,NOT_SWEET)||anyHas(text,YES_SWEET)||anyHas(text,COLD)||anyHas(text,FROZEN)||anyHas(text,NO_CAF)||anyHas(text,GENERIC_DRINK)||anyHas(text,HEALTH_LEAN)||!!referencedProduct(text,CATALOG);
}
function forceNeed(fns,text){
  C.need=newNeed();C.need.rawUtterance=text;C.need.functions=fns;
  return doRank({need:text,scores:{},fns:[...fns],constraints:{...C.need.constraints},candidates:[],exclusions:[],decision:"open pick",inv:""});
}
function metaIntent(text){
  const info=infoTopic(text);
  if(info==="price"||info==="pay")return {kind:"say",text:L().info(info)};   // answer money questions honestly, even over a product mention
  if(anyHas(text,HOT_WANT))return {kind:"say",text:L().noHot};               // we stock nothing hot/room-temp — say so instead of handing over a chilled water
  // "surprise me" / "you pick" = open choice. "surprise" also scores as a gift cue (a blind box IS a surprise),
  // so only treat it as a real gift when the shopper adds an explicit gift word; otherwise recommend across
  // drinks & treats instead of defaulting to the same mystery box every time.
  if(anyHas(text,SURPRISE)){
    const sc=scoreFunctions(text);
    const otherNeed=Object.keys(sc).some(f=>f!=="gift_novelty"&&sc[f]>=THRESHOLD)||anyHas(text,COLD)||anyHas(text,FROZEN)||anyHas(text,NOT_SWEET)||anyHas(text,YES_SWEET)||anyHas(text,GENERIC_DRINK)||anyHas(text,HEALTH_LEAN)||!!referencedProduct(text,CATALOG);
    const explicitGift=anyHasUnnegated(text,["gift","present","collectible","blind box","blindbox","mystery box","souvenir","for a friend","for my","birthday","礼物","礼品","盲盒","收藏","手办","送人","送朋友","送礼","送给"]);
    if(!otherNeed&&!explicitGift)return forceNeed(["hydration","rehydration_electrolytes","fruit_refreshment","treat_dessert"],text);
  }
  if(hasNeedSignal(text)) return null;
  if(info==="location")return {kind:"say",text:L().info("location")};        // only when they didn't also name a product
  if(anyHas(text,THANKS)) return {kind:"say",text:L().thanks()};
  if(anyHas(text,HELP)) return {kind:"say",text:L().help};
  if(GREET.some(g=>text===g||text.startsWith(g+" ")||text.startsWith(g+",")||text.startsWith(g))) return {kind:"say",text:L().greetReply()};
  return null;
}

function handle(raw){
  const text=normalize(raw);
  C.history.push({role:"user",text:raw});
  if(anyHas(text,EXIT)){C.state="END";return {kind:"say",text:L().exit(C.cart.length>0),clear:true};}
  // "clear the cart" / "remove everything" / 清空 — honoured from ANY state.
  if(anyHas(text,CLEAR)){C.cart=[];C.queue=[];C.state="ELICIT_NEED";return {kind:"cleared",text:L().cartCleared};}
  // Checkout is honoured from ANY state (this is also where the always-enabled Checkout button routes).
  if(anyHas(text,STRONG_CHECKOUT)){
    if(!C.cart.length){C.state="ELICIT_NEED";return {kind:"say",text:L().cartEmptyElicit};}
    return checkout();
  }
  // We stock nothing caffeinated — answer honestly instead of handing over a caffeine-free drink for a caffeine request.
  if(anyHas(text,YES_CAF)&&!anyHas(text,NO_CAF)&&!CATALOG.some(p=>p.caffeine&&p.in_stock)
     &&(C.state==="GREETING"||C.state==="ELICIT_NEED"||C.state==="END"||C.state==="POST_ADD")){
    if(C.state==="END")C.cart=[];
    C.state=C.cart.length?"POST_ADD":"ELICIT_NEED";
    return {kind:"say",text:L().noCaffeine};
  }

  if(C.state==="GREETING"||C.state==="ELICIT_NEED"||C.state==="END"){
    if(C.state==="END")C.cart=[];
    const meta=metaIntent(text);
    if(meta)return meta;
    if(!hasNeedSignal(text)){
      // A bare quantity ("give me three", "a couple") names no product — ask what, don't guess in the LLM.
      if(parseQty(text)!=null)return {kind:"say",text:L().qIdentify};
      // A bare filler opener ("yes", "no", "hmm", "ok") carries no need — a quick re-prompt beats spinning up the LLM.
      if(text&&text.split(" ").every(w=>FILLER.has(w)))return {kind:"say",text:L().qIdentify};
      return {kind:"escalate",raw};   // rules recognise nothing → hand this turn to the LLM
    }
    return beginNeed(raw);
  }
  if(C.state==="CLARIFY"){C.need.clarifyCount++;C.need.rawUtterance=(C.need.rawUtterance+" "+text).trim();return infer();}

  if(C.state==="RECOMMEND"){
    const need=C.need;
    // show alternatives
    if(anyHas(text,MORE_CUES)&&!anyHas(text,ACCEPT)){
      C.lastOptions=need.candidates.slice(0,3);
      return {kind:"options",options:C.lastOptions};
    }
    // ordinal pick from last options
    const ord=parseOrdinal(text);
    if(ord!=null&&C.lastOptions.length){
      const pick=ord===-1?C.lastOptions[C.lastOptions.length-1]:C.lastOptions[ord];
      if(pick){need.currentRec=pick;C.lastRec=pick;
        if(anyHas(text,ACCEPT)||/\b(take|have|get|want|add|instead)\b/.test(text))return accept(parseQty(text));
        return {kind:"recommend",rec:pick,reselect:true};}
    }
    // A NEW category voiced mid-recommendation ("actually a gift instead", "let's do a juice", "rather have water")
    // → start that need fresh instead of answering about the current pick. Fires only for a genuinely different
    // category (a strong new function, or a named product from another category), so within-category tweaks,
    // accepts, quantities and product questions are all left to the branches below.
    if(!anyHas(text,ACCEPT)&&parseQty(text)==null){
      const ns=scoreFunctions(text);
      const strongNew=Object.keys(ns).some(f=>ns[f]>=THRESHOLD&&!need.functions.includes(f));
      const xref=referencedProduct(text,CATALOG);
      const xcat=xref&&!need.candidates.includes(xref)&&!xref.function_tags.some(f=>need.functions.includes(f));
      if(strongNew||xcat)return beginNeed(raw);
    }
    // named reference ("the pink one", "the mango")
    const SWITCH=["different","换","换个","换一个","再换"];   // "switch to X" reads as a reference, not a plain no
    const ref=referencedProduct(text,need.candidates.length?need.candidates:CATALOG);
    if(ref&&!anyHas(text,DECLINE.filter(d=>!SWITCH.includes(d)))){
      need.currentRec=ref;C.lastRec=ref;
      if(!need.candidates.includes(ref)){need.functions=[...new Set([...need.functions,...ref.function_tags])];}
      if(anyHas(text,ACCEPT)||anyHas(text,SWITCH)||/\b(take|have|get|want|add|instead|rather|prefer)\b/.test(text))return accept(parseQty(text));
      return {kind:"recommend",rec:ref,reselect:true};
    }
    // quantity => accept with qty
    const q=parseQty(text);
    if(q!=null&&!anyHas(text,DECLINE)){return accept(q);}
    // accept
    if(anyHas(text,ACCEPT)&&!anyHas(text,DECLINE)){return accept(parseQty(text));}
    // product question about the current pick ("is it cold?", "how much sugar?") → answer it, keep the same rec.
    // Must run BEFORE constraint extraction, else "is it cold?" is misread as a "make it cold" refinement.
    if(isProductQuestion(raw,text)&&!anyHas(text,ACCEPT)&&!anyHas(text,DECLINE)){
      const topic=questionTopic(text);
      return {kind:"say",text:topic?L().askAbout(need.currentRec,topic):L().askMore(need.currentRec)};
    }
    // decline with 'too sweet'
    if(has(text,"too sweet")||has(text,"too sugary")){
      need.offeredSkus.push(need.currentRec.id);
      need.constraints.max_sweetness=Math.max(0,need.currentRec.sweetness-1);need.constraints.notSweet=true;need.constraints.prefer_sugar=["none","low"];
      if(!need.functions.includes("hydration"))need.functions.push("hydration");persistPrefs("not sweet");
      return doRank(freshReason());
    }
    // decline with a new constraint
    if(anyHas(text,NOT_SWEET)||anyHas(text,COLD)||anyHas(text,FROZEN)||anyHas(text,WARM)||anyHas(text,NO_CAF)){
      extractInto(need.constraints,text);persistPrefs(text);
      // if the current pick already meets the new constraint (e.g. "make it cold" on an already-chilled water),
      // keep it rather than switching to a different product for no reason.
      if(passes(need.currentRec,need.constraints))return {kind:"recommend",rec:need.currentRec,reselect:true};
      need.offeredSkus.push(need.currentRec.id);
      return doRank(freshReason());
    }
    // plain decline
    if(anyHas(text,DECLINE)){
      need.offeredSkus.push(need.currentRec.id);return doRank(freshReason());
    }
    // ask_more
    return {kind:"say",text:L().askMore(need.currentRec)};
  }

  if(C.state==="POST_ADD"){
    const last=(C.need&&C.need.currentRec)||C.lastRec;
    // "make it three" / "change to 2" / 改成两个 → SET the last item's quantity (not add more)
    const sq=setQtyIntent(text);
    if(sq!=null&&last){const line=C.cart.find(i=>i.id===last.id);
      if(line){line.qty=Math.min(Math.max(1,sq),last.qty);return {kind:"added",product:last,qty:line.qty,capped:sq>last.qty,setTo:true};}}
    // "one more" / "N more" → re-add the item we just added
    const rq=readdQty(text);
    if(rq!=null&&last){cartAdd(last,rq);return {kind:"added",product:last,qty:Math.min(rq,last.qty),capped:rq>last.qty};}
    // done → checkout (soft done-cues or a bare "no"; NOT when browsing, naming a product, or stating a need)
    if((anyHas(text,CHECKOUT_CUES)||anyHas(text,DONE_NO))&&!anyHas(text,MORE_CUES)&&!anyHas(text,BROWSE)&&!scoreFunctions(text).length&&!referencedProduct(text,CATALOG)){
      if(!C.cart.length){C.state="ELICIT_NEED";return {kind:"say",text:L().cartEmptyElicit};}
      return checkout();
    }
    // browse ("what else do you have", "something else") → show the menu, stay open for a new item
    if((anyHas(text,BROWSE)||anyHas(text,MORE_CUES))&&!hasNeedSignal(text)&&!referencedProduct(text,CATALOG)){
      return {kind:"say",text:L().help};
    }
    // remove item
    if(/(?:remove|take off|drop|delete|without|移除|去掉|删掉|拿掉|去除|不要了)/.test(text)){
      const ref=referencedProduct(text,C.cart.map(i=>CATALOG.find(p=>p.id===i.id)));
      if(ref){cartRemove(ref.id);return {kind:"removed",product:ref};}
    }
    // small talk in the middle of shopping
    if(anyHas(text,THANKS)&&!hasNeedSignal(text)) return {kind:"say",text:L().thanksPost()};
    const meta=metaIntent(text);
    if(meta)return meta;                                           // help/greet reply, or "you pick" → recommend
    if(!hasNeedSignal(text))return {kind:"escalate",raw};          // unrecognised mid-shopping → hand to LLM
    // otherwise a new need
    return beginNeed(raw);
  }
  return {kind:"escalate",raw};   // truly nothing matched → let the LLM try
}
function freshReason(){const n=C.need;return {need:n.rawUtterance,scores:n.scores,fns:[...n.functions],constraints:{...n.constraints},candidates:[],exclusions:[],decision:"",inv:""};}

/* ===================== IN-BROWSER LLM (WebLLM · WebGPU) ===================== */
// The rule engine handles almost everything instantly and offline; only genuinely unrecognized turns escalate here.
// This runs a small model ENTIRELY in the visitor's browser via WebGPU — no server, no API key, no Ollama. On the
// FIRST escalation it downloads the model (~1 GB) from a CDN and caches it; after that it's instant. If WebGPU is
// unavailable or the load fails, we fall back to a single clarifying question, so the file works for everyone.
let ollHistory=[];
// Bilingual, prebuilt WebLLM ids, tried in order. Qwen2.5-3B is a lot sharper than 1.5B on the rare off-script turn
// and still strong in Chinese; if it can't load (older GPU / limited memory) we fall back to the smaller 1.5B, so
// no device is left without the AI. Now that the rules answer almost everything, the bigger first-load is rarely paid.
const WEBLLM_MODELS=["Qwen2.5-3B-Instruct-q4f16_1-MLC","Qwen2.5-1.5B-Instruct-q4f16_1-MLC"];
let WEBLLM_ACTIVE=WEBLLM_MODELS[0];
let _mlc=null,_mlcLoading=null;
async function loadLLM(onProgress){
  if(_mlc)return _mlc;
  if(!_mlcLoading){
    _mlcLoading=(async()=>{
      if(!navigator.gpu)throw new Error("no-webgpu");
      const webllm=await import("https://esm.run/@mlc-ai/web-llm");   // loaded lazily, only when an escalation needs it
      let lastErr;
      for(const id of WEBLLM_MODELS){
        try{const e=await webllm.CreateMLCEngine(id,{initProgressCallback:onProgress});WEBLLM_ACTIVE=id;return e;}
        catch(err){lastErr=err;}   // bigger model may OOM or be unavailable → try the next (smaller) one
      }
      throw lastErr;
    })();
  }
  try{_mlc=await _mlcLoading;return _mlc;}catch(e){_mlcLoading=null;throw e;}
}
// Compact one-line-per-item table instead of full JSON — far fewer prompt tokens (keywords/blurb dropped; they're
// only for the rule engine, the LLM doesn't need them). Fewer tokens = faster prefill on a local model.
function catalogForLLM(){
  return CATALOG.map(p=>[p.id,zh()?(ZH_NAME[p.id]||p.name):p.name,p.category,p.function_tags.join("/"),p.sweetness,p.sugar_level,p.served,p.caffeine?"caffeine":"caffeine-free",p.qty].join(" | ")).join("\n");
}

// tolerant of small-model sloppiness: enum echoed in "action", multiple/space-joined "sku"
const ACTIONS=["recommend","add_to_cart","remove_from_cart","checkout","ask_clarifying","reply"];
function applyAction(a){
  C.llmRec=null;
  const act=ACTIONS.find(x=>String(a.action||"").toLowerCase().includes(x))||"reply";  // recommend-first = safest read of an echoed enum
  let sku=null;
  if(a.sku){sku=String(a.sku).split(/[^A-Za-z0-9_]+/).map(s=>s.toLowerCase()).find(id=>byId(id))||null;}  // first valid id
  C.llmReason={engine:"In-browser · "+WEBLLM_ACTIVE.replace(/-q4.*$/,""),action:act,sku};
  const p=sku?byId(sku):null;
  // hand the resulting state back to the rule engine so the NEXT turn can be answered instantly by the rules.
  if(act==="recommend"&&p){C.llmRec=p;C.lastRec=p;C.lastOptions=[p];
    C.need=newNeed();C.need.currentRec=p;C.need.candidates=[p];C.need.functions=[...p.function_tags];
    C.state="RECOMMEND";return {text:a.message,rec:p};}
  if(act==="add_to_cart"&&p){const q=Math.min(Math.max(1,a.qty||1),p.qty);cartAdd(p,q);C.llmRec=p;C.lastRec=p;C.state="POST_ADD";return {text:a.message};}
  if(act==="remove_from_cart"&&p){cartRemove(p.id);C.state=C.cart.length?"POST_ADD":"ELICIT_NEED";return {text:a.message};}
  if(act==="checkout"){const items=C.cart.map(i=>({...i}));C.cart=[];C.state="ELICIT_NEED";return {text:a.message,checkout:items};}
  return {text:a.message};   // ask_clarifying / reply / recommend-without-valid-sku — leave state; rules re-escalate next turn if still unrecognised
}
async function respondLLM(raw){
  const t=addMsg("bot",'<span class="typing"><span></span><span></span><span></span></span>');
  const bub=t.querySelector(".bub");
  try{
    // First escalation loads the model (~1 GB, cached afterwards) — show download progress in the bubble.
    const engine=await loadLLM(p=>{const pct=Math.round(((p&&p.progress)||0)*100);
      bub.innerHTML=esc((zh()?"正在加载浏览器内 AI…":"Loading the in-browser AI…")+" "+pct+"%")+'<span class="caret"></span>';});
    const cartStr=C.cart.length?C.cart.map(i=>`${i.qty}x ${i.name}`).join(", "):"empty";
    const messages=[{role:"system",content:sysPrompt()},...ollHistory,{role:"user",content:`[current cart: ${cartStr}]\n\nShopper: ${raw}`}];
    // Stream so the reply types out live as the in-browser model generates it.
    const stream=await engine.chat.completions.create({messages,temperature:0.2,max_tokens:256,response_format:{type:"json_object"},stream:true});
    let content="";
    for await(const chunk of stream){
      const d=(chunk&&chunk.choices&&chunk.choices[0]&&chunk.choices[0].delta&&chunk.choices[0].delta.content)||"";
      if(!d)continue;
      content+=d;
      const partial=partialMessage(content);            // extract the message field as it fills in
      if(partial){bub.innerHTML=esc(partial)+'<span class="caret"></span>';msgsEl.scrollTop=msgsEl.scrollHeight;}
    }
    let a;try{a=JSON.parse(content);}catch(e){throw new Error("non-JSON reply");}   // full JSON action, now complete
    ollHistory.push({role:"user",content:raw});ollHistory.push({role:"assistant",content:a.message||"(ok)"});
    if(ollHistory.length>8)ollHistory.splice(0,ollHistory.length-8);   // keep only recent turns so the prompt stays small (fast prefill)
    const r=applyAction(a);
    let html=esc(r.text||"")+(r.rec?recCard(r.rec):"");
    if(r.checkout){const plan=r.checkout.map(i=>L().planRow(zh()?DIRW_ZH[i.location.turn_direction]:DIRW[i.location.turn_direction],i.qty,i.ett,pname(byId(i.id)))).join("");html=esc(r.text||"")+`<div class="plan">${plan}</div>`;}
    bub.innerHTML=html;refresh();
  }catch(err){
    // WebGPU missing / model load failed / bad output — the rules already couldn't parse this turn, so fall back
    // to a single clarifying question rather than re-running the rules (which would re-escalate).
    const why=(err&&err.message==="no-webgpu")?L().ui.noWebGPU:L().ui.llmErr;
    bub.innerHTML=`<span class="err">⚠ ${why}</span>`;
    C.llmReason=null;C.llmRec=null;C.state=C.cart.length?"POST_ADD":"ELICIT_NEED";
    botSay(esc(L().qIdentify));
  }
}
// Rule engine first: it answers instantly and offline, and keeps the rich need→function→candidates reasoning
// panel. Only genuinely unrecognized turns escalate to the in-browser model (which still runs the full
// recommend / add_to_cart / checkout action set). Language auto-detected per message.
function respondRaw(raw){
  const detected=/[一-鿿]/.test(raw)?"zh":"en";
  if(LANG_SOURCE!=="manual"&&detected!==LANG)setLangUI(detected,"auto");   // only rebuild the UI when the language actually flips
  const r=handle(raw);                                    // immediate, rule-based response
  if(r&&r.kind==="escalate")return respondLLM(raw);       // rules didn't understand → in-browser AI
  C.llmReason=null;C.llmRec=null;                          // rule turn: show the scratchpad panel, not the LLM line
  render(r);
}
function send(){const v=inEl.value.trim();if(!v)return;addMsg("user",esc(v));inEl.value="";respondRaw(v);}
function reset(){C=newConvo();ollHistory=[];C.llmRec=null;C.llmReason=null;msgsEl.innerHTML="";C.state="ELICIT_NEED";refresh();addMsg("bot",L().greet());}

// update all static UI labels for the current language (no conversation reset)
function setLangUI(l,source="auto"){
  LANG=l;LANG_SOURCE=source;
  const u=L().ui;
  document.documentElement.lang=l==="zh"?"zh":"en";
  document.getElementById("t-chat").textContent=u.chat;
  document.getElementById("t-reason").textContent=u.reason;
  document.getElementById("t-session").textContent=u.session;
  document.getElementById("t-prefs").textContent=u.prefs;
  document.getElementById("t-cartlabel").textContent=u.cart;
  document.getElementById("t-inv").textContent=u.inv;
  checkoutBtn.textContent=u.checkout;
  document.getElementById("send").textContent=u.send;
  inEl.placeholder=u.placeholder;
  document.getElementById("legend").innerHTML=u.legend.map(x=>`<span>${x}</span>`).join("");
  chipsEl.innerHTML=L().chips.map(e=>`<span class="chip">${esc(e)}</span>`).join("");
  chipsEl.querySelectorAll(".chip").forEach((c,i)=>c.onclick=()=>{addMsg("user",esc(L().chips[i]));respondRaw(L().chips[i]);});
  document.getElementById("lang-en").classList.toggle("on",l==="en");
  document.getElementById("lang-zh").classList.toggle("on",l==="zh");
  refresh();
  refresh();
  refreshGreetingBubble();
  // If the conversation hasn't started yet, always replace the first bot greeting
  try{
    if((typeof C==='undefined')||!C.history||C.history.length===0){
      const firstBotBubble = msgsEl.querySelector('.row.bot .bub');
      if(firstBotBubble && !firstBotBubble.querySelector('.typing')){
        firstBotBubble.innerHTML = esc(L().greet());
      }
    }
  }catch(e){/* ignore */}
}

document.getElementById("send").onclick=send;
document.getElementById("reset").onclick=reset;
document.getElementById("lang-en").onclick=()=>setLangUI("en","manual");
document.getElementById("lang-zh").onclick=()=>setLangUI("zh","manual");
checkoutBtn.onclick=()=>{if(C.cart.length){const m=zh()?"结账":"check me out";addMsg("user",m);respondRaw(m);}};
inEl.addEventListener("keydown",e=>{if(e.key==="Enter")send();});
reset();setLangUI("en","auto");   // reset() initialises C first, then labels are set
</script>
